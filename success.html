<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Received | PrimLiQ</title>
    <style>
        :root {
            --prim-teal: #00cece;
            --dark-bg: #0d0f10;
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 20%, #1a1e22 0%, #0d0f10 100%);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        .success-box {
            padding: 60px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            max-width: 450px;
        }

        .icon {
            font-size: 3rem;
            color: var(--prim-teal);
            margin-bottom: 20px;
        }

        h2 {
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        p {
            color: #888;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .close-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 0.75rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: var(--prim-teal);
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 206, 206, 0.4);
        }
    </style>
</head>
<body>
    <div class="success-box">
        <div class="icon">✓</div>
        <h2>MISSION RECEIVED</h2>
        <p>Your inquiry has been transmitted. The high-level strategy for your project begins now. Expect a response shortly.</p>
        <a href="#" onclick="window.close(); return false;" class="close-btn">CLOSE SESSION</a>
    </div>
</body>
</html>
