<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry | PrimLiQ</title>
    <!-- Font Awesome for Search Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --prim-teal: #00cece;
            --prim-silver: #a8a8a8;
            --dark-bg: #0d0f10;
            --glass: rgba(255, 255, 255, 0.03);
            --neon-glow: 0 0 20px rgba(0, 206, 206, 0.4);
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 20%, #1a1e22 0%, #0d0f10 100%);
            color: #d1d1d1;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 100px; /* Space for fixed nav */
            box-sizing: border-box;
        }

        /* --- RESTORED ALPHA NAVIGATION --- */
        .top-nav {
            position: fixed; top: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 40px; background: rgba(13, 15, 16, 0.9);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 9999; box-sizing: border-box; border-bottom: 1px solid rgba(0, 206, 206, 0.25);
        }

        .nav-logo { 
            font-weight: 900; letter-spacing: 5px; color: #fff; text-decoration: none; font-size: 1.1rem; 
            text-shadow: 0 0 10px rgba(0, 206, 206, 0.8);
            transition: 0.3s ease;
        }
        .nav-logo:hover { color: var(--prim-teal); }

        .nav-search-container { position: relative; flex-grow: 1; max-width: 400px; margin: 0 30px; }
        .nav-search-input {
            width: 100%; padding: 8px 15px 8px 35px; background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px;
            color: #fff; font-size: 0.8rem; transition: all 0.3s ease;
        }
        .nav-search-container::before {
            content: '\f002'; font-family: "Font Awesome 5 Free"; font-weight: 900;
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            color: var(--prim-teal); font-size: 0.8rem; opacity: 0.6;
        }

        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-item { color: var(--prim-silver); text-decoration: none; text-transform: uppercase; font-size: 0.65rem; font-weight: 700; letter-spacing: 1.5px; transition: 0.3s; padding: 6px 10px; }
        .nav-item:hover { color: var(--prim-teal); text-shadow: var(--neon-glow); }
        .nav-item.highlight { border: 1px solid rgba(0, 206, 206, 0.3); background: rgba(0, 206, 206, 0.05); border-radius: 4px; }

        /* --- CONTACT CARD --- */
        #contact-container {
            padding: 50px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: #fff;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-size: 1.5rem;
        }

        .input-field {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            color: #fff;
            box-sizing: border-box;
            font-family: inherit;
            transition: 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--prim-teal);
            background: rgba(0, 206, 206, 0.05);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #fff 0%, #a8a8a8 100%);
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: var(--prim-teal);
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 206, 206, 0.4);
            transform: translateY(-2px);
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            color: #666;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .back-btn:hover { color: var(--prim-teal); }

        /* --- MASCOT COMPANION --- */
        .nav-mascot {
            position: fixed; bottom: 30px; left: 40px; width: 80px;
            filter: drop-shadow(var(--neon-glow));
            animation: float 4s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="index.html" class="nav-logo">PrimLiQ</a>
    
        <div class="nav-search-container">
            <input type="text" class="nav-search-input" placeholder="SEARCH DATABASE..." id="armorySearch">
        </div>

        <div class="nav-links">
            <!-- Navigation links now open in SAME TAB (target="_blank" removed) -->
            <a href="about.html" class="nav-item">About</a>
            <a href="assets.html" class="nav-item highlight">Armory</a>
            <a href="contact.html" class="nav-item">Contact</a>
        </div>
    </nav>

    <div id="contact-container">
        <h2>Initiate Inquiry</h2>
        
        <form id="primliq-form" action="https://formspree.io/f/meerpnnq" method="POST">
            <input type="text" name="name" class="input-field" placeholder="FULL NAME" required>
            <input type="email" name="email" class="input-field" placeholder="EMAIL ADDRESS" required>
            <textarea name="message" class="input-field" rows="5" placeholder="REASON FOR INQUIRY" required></textarea>
            <button type="submit" class="submit-btn" id="submit-btn">SUBMIT TO PRIMLIQ</button>
        </form>

        <a href="index.html" class="back-btn">← BACK TO HOME</a>
    </div>

    <!-- Floating Mascot for visual consistency -->
    <img src="mascot.png" alt="Mascot" class="nav-mascot">

    <script>
        const form = document.getElementById("primliq-form");
        const container = document.getElementById("contact-container");

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById("submit-btn");
            
            btn.innerText = "TRANSMITTING...";
            btn.style.opacity = "0.7";
            btn.disabled = true;

            const formData = new FormData(form);
            try {
                const response = await fetch(form.action, {
                    method: form.method,
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    container.innerHTML = `
                        <h2 style="color: var(--prim-teal); letter-spacing: 5px;">MISSION RECEIVED</h2>
                        <p style="color: #888; line-height: 1.6; margin-bottom: 30px;">Your inquiry has been successfully transmitted.<br>Expect strategic engagement shortly.</p>
                        <a href="index.html" class="submit-btn" style="text-decoration:none; display:block;">RETURN TO HUB</a>
                    `;
                } else {
                    throw new Error();
                }
            } catch (err) {
                btn.innerText = "ERROR - RETRY";
                btn.style.opacity = "1";
                btn.disabled = false;
            }
        };

        // Search logic consistency
        document.getElementById('armorySearch').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                window.location.href = 'assets.html?search=' + e.target.value;
            }
        });
    </script>

</body>
</html>
