<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimLiQ | Personnel Dossier</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --prim-teal: #00cece;
            --prim-silver: #a8a8a8;
            --dark-bg: #0d0f10;
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 20%, #1a1e22 0%, #0d0f10 100%);
            color: #d1d1d1;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding-top: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Navigation (Consistent with Index) */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(13, 15, 16, 0.85);
            backdrop-filter: blur(12px);
            z-index: 2000;
            box-sizing: border-box;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-logo { font-weight: 900; letter-spacing: 3px; color: #fff; text-decoration: none; font-size: 0.9rem; text-transform: uppercase; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-item { color: var(--prim-silver); text-decoration: none; text-transform: uppercase; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; transition: 0.3s; padding: 8px 12px; }
        .nav-item:hover { color: var(--prim-teal); }
        .nav-item.highlight { border: 1px solid rgba(0, 206, 206, 0.4); background: rgba(0, 206, 206, 0.05); color: #fff; border-radius: 4px; }

        /* Dossier Layout */
        .dossier-container {
            max-width: 800px;
            width: 90%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--prim-teal);
            padding: 40px;
            margin-bottom: 60px;
            position: relative;
            overflow: hidden;
        }

        .dossier-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .subject-info h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
        }
